profile:
  id: forma-self-base
  description: Forma project-owned defaults for managing Forma development iterations.
bundle:
  name: forma
  description: Forma plan-first workflow bundle configured for self-iteration management.
org:
  name: Forma Maintainers
terminology:
  issue: Forma issue
  repository: Forma workspace
  profile: tracked Forma profile
  generated suite: target-specific Plan-First workflow output
constraints:
  default:
    - Treat this profile stack as Forma-owned project source, not a sanitized public example.
    - Keep downstream organization-specific workflow commands, private paths, credentials, and business rules out of Forma examples.
    - Do not write the invoking developer's home-directory path into tracked source, docs, profiles, plans, tests, examples, or generated release artifacts.
    - Preserve unrelated user work in the dirty worktree and keep commits scoped to the current issue.
    - Keep changes scoped to the active issue plan and tasks.
  shape:
    - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, and active plans/issue-<id>/ files when converging Forma governance, scope, validation, or boundary decisions.
    - For new or changed Forma functionality, plan the developer CLI surface first; if behavior is creator-visible, include the matching forma-creator and bundled-verifier sync in the same issue.
    - For Layer 1 temporary injection work, classify natural-language constraints into minimal default, stage-specific execution, or conditional overlay targets before writing examples or tasks.
    - Prefer durable profile changes for repeated behavior and one-off constraints only for temporary generated suites.
  gauge:
    - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, active plan/task files, pyproject.toml, relevant source directories, tests, and examples read-only before finalization.
  seal:
    - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, and active plans/issue-<id>/ files before writing final tasks that affect Forma governance, profile ownership, generated baselines, or documentation policy.
    - For creator-visible functionality changes, write tasks that validate both the developer CLI path and the bundled forma-creator path.
    - If profiles/forma-self changes, include regeneration and Codex plugin installation proof before issue closure.
    - Prefer durable profile changes for repeated behavior and one-off constraints only for temporary generated suites.
validation_commands:
  default:
    - uv run --extra dev python -m pytest -p no:cacheprovider tests/
    - uv run --extra dev forma verify source/skill-creator/
    - git diff --check
