profile:
  id: forma-self-iteration
  description: Top-level project-owned profile for managing Forma's own development iterations.
includes:
  - forma-self-base
  - forma-self-project
  - forma-self-iteration-overlays
bundle:
  name: forma
  description: Project-owned profile that emits canonical forma-* plan-first skills for Forma self-iteration.
stages:
  shape:
    name: forma-shape
    directory: forma-shape
    display_name: Shape
    short_description: Converge a Forma self-iteration plan with layer, profile, generated baseline, docs, and validation boundaries.
    default_prompt: >-
      $forma-shape: 为 Forma 仓库收敛一个自我迭代计划，明确 Layer impact、profile ownership、generated baseline policy、文档更新和验证边界；不要读仓库或写计划文件。
  gauge:
    name: forma-gauge
    directory: forma-gauge
    display_name: Gauge
    short_description: Read Forma repository facts and produce grounding for a self-iteration plan.
    default_prompt: >-
      $forma-gauge: 只读确认 Forma 当前计划、文档、methodology、creator、profiles、tests 和 generated baseline 状态，输出 grounding handoff。
  seal:
    name: forma-seal
    directory: forma-seal
    display_name: Seal
    short_description: Finalize a Forma self-iteration plan with tasks, validation gates, and generated-output policy.
    default_prompt: >-
      $forma-seal: 把已收敛并 grounding 过的 Forma 自我迭代计划写入 plan.md/tasks.md，并明确每个 task 的验证和 generated baseline 边界。
  pour:
    name: forma-pour
    directory: forma-pour
    display_name: Pour
    short_description: Execute one Forma self-iteration task through focused validation and review.
    default_prompt: >-
      $forma-pour: 按 sealed tasks.md 执行当前 Forma 自我迭代 task，先跑相关窄验证，再跑必要共享 gate，进入 review-ready。
  flow:
    name: forma-flow
    directory: forma-flow
    display_name: Flow
    short_description: Execute a finalized Forma self-iteration plan when all layer, profile, generated baseline, and validation gates pass.
    default_prompt: >-
      $forma-flow: 在 Layer、profile ownership、generated baseline、docs 和验证门禁都清楚时，自动执行已 finalize 的 Forma 自我迭代计划。
