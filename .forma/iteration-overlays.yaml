profile:
  id: forma-self-iteration-overlays
  description: Conditional overlays for routing Forma self-iteration work by primary impact area.
conditional_overlays:
  decision:
    name: Iteration Area
    must_record_in_plan: true
    missing_during_execution: stop-for-plan-correction
  routes:
    - id: docs-only
      description: Documentation-only changes.
      overlays: [docs]
    - id: governance
      description: Repository governance, AGENTS instructions, workflow policy, or self-management rule changes.
      overlays: [governance]
    - id: methodology-verifier
      description: Canonical methodology or bundled verifier changes.
      overlays: [methodology, verifier]
    - id: creator-profile
      description: Profile composer, target adapter, profile schema, or profile stack changes.
      overlays: [creator, profiles]
    - id: generated-baseline
      description: Committed generated output replacement or drift baseline update.
      overlays: [generated]
    - id: cross-surface
      description: Coordinated work across multiple Forma source, docs, tests, profile, verifier, creator, and generated-output surfaces.
      overlays: [methodology, verifier, creator, profiles, generated, docs]
  overlays:
    docs:
      description: Documentation update rules.
      constraints:
        shape:
          - Identify affected docs and whether README.zh-CN.md must stay aligned with README.md.
        pour:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, and dist/AGENTS.md when release-surface documentation is in scope before editing Forma documentation.
          - Remove stale command examples, deprecated flags, and references to superseded profile locations.
        flow:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, and dist/AGENTS.md when release-surface documentation is in scope before automated documentation edits.
      validation_commands:
        pour:
          - uv run --extra dev python -m pytest -p no:cacheprovider tests/test_docs_links.py
          - git diff --check README.md README.zh-CN.md STRUCTURE.md AGENTS.md dist/AGENTS.md docs
    governance:
      description: Repository governance and self-management policy rules.
      constraints:
        shape:
          - "Identify which governance surface changes: README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, dist/AGENTS.md, .forma, or plan-first workflow policy."
        pour:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, dist/AGENTS.md when release artifacts are in scope, and active plan files before changing governance or self-management policy.
        flow:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, dist/AGENTS.md when release artifacts are in scope, and active plan files before automated governance or self-management policy changes.
      validation_commands:
        pour:
          - git diff --check README.md README.zh-CN.md STRUCTURE.md AGENTS.md dist/AGENTS.md .forma
    methodology:
      description: Methodology source and generated skill body rules.
      constraints:
        shape:
          - State which canonical methodology stage, fragment, or fixed resource changes and how it affects generated skills.
        pour:
          - Keep source/methodology as the canonical source and do not duplicate methodology truth inside source/skill-creator.
      validation_commands:
        pour:
          - uv run --extra dev python -m pytest -p no:cacheprovider tests/test_creator.py tests/test_verifier.py tests/test_layer_1_dogfood.py
          - uv run --extra dev forma verify source/skill-creator/
    verifier:
      description: Bundled verifier rules.
      constraints:
        shape:
          - Define the rule being added, relaxed, or tightened and the target workflow-output shape it protects.
        pour:
          - Add paired positive and negative verifier coverage for rule changes.
      validation_commands:
        pour:
          - uv run --extra dev python -m pytest -p no:cacheprovider tests/test_verifier.py tests/test_layer_1_dogfood.py
    creator:
      description: Profile composer, emitter, manifest, adapter, and CLI rules.
      constraints:
        shape:
          - Identify whether the change affects profile loading, composition, target emission, manifest provenance, output replacement, or creator builder behavior.
        pour:
          - Keep generated skill bodies deterministic except for generated_at unless a plan explicitly changes that contract.
      validation_commands:
        pour:
          - uv run --extra dev python -m pytest -p no:cacheprovider tests/test_creator.py tests/test_creator_builder.py
    profiles:
      description: Tracked profile stack rules.
      constraints:
        shape:
          - Decide whether a profile is Forma-owned under .forma/, sanitized example content under examples/profiles/, or downstream-owned outside this repository.
        pour:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, and AGENTS.md before changing Forma-owned profiles or generated self-iteration behavior.
          - Verify every affected top-level profile by running forma build bundle or forma build plugin into /tmp, /private/tmp, or $TMPDIR and then running forma verify for at least one target.
          - After changing .forma, generate self-profile output only into a transient path and verify it; install through Codex only when the issue explicitly requires refreshing the local self-iteration workflow.
        flow:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, and AGENTS.md before automated Forma-owned profile changes.
          - After automated .forma changes, generate self-profile output only into a transient path and verify it; install through Codex only when the issue explicitly requires refreshing the local self-iteration workflow.
      validation_commands:
        pour:
          - uv run --extra dev python -m pytest -p no:cacheprovider tests/test_creator.py
    generated:
      description: Committed generated output baseline rules.
      constraints:
        shape:
          - State which committed generated output paths are drift baselines and why they must change.
        pour:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, and dist/AGENTS.md before replacing generated baselines or release artifacts that affect documented workflow behavior.
          - For dist release artifacts, regenerate the product default workflow output by omitting --profile unless a future issue explicitly changes the release contract; do not commit .forma output into dist.
          - For committed example baselines, require the plan to name the exact generated output paths and verification commands before execution, then regenerate from the owning committed profile and stage removed old directories plus new generated directories together.
        flow:
          - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, and dist/AGENTS.md before automated generated baseline or release-artifact replacement.
      validation_commands:
        flow:
          - uv run --extra dev python -m pytest -p no:cacheprovider tests/
