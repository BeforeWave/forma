profile:
  id: forma-self-base
  description: Forma project-owned defaults for managing Forma development iterations.
bundle:
  name: forma
  description: Forma plan-first workflow bundle configured for self-iteration management.
org:
  name: Forma Maintainers
terminology:
  issue: Forma issue
  repository: Forma workspace
  profile: tracked Forma profile
  workflow output: target-specific Plan-First workflow output
constraints:
  default:
    - Treat this profile stack as Forma-owned project source, not a sanitized public example.
    - Keep downstream organization-specific workflow commands, private paths, credentials, and business rules out of Forma examples.
    - Do not write the invoking developer's home-directory path into tracked source, docs, profiles, plans, tests, examples, or generated release artifacts.
    - Preserve unrelated user work in the dirty worktree and keep commits scoped to the current issue.
    - Keep changes scoped to the active issue plan and tasks.
    - Use the minimum durable design surface that solves the current issue; agent-friendly structure, scripts, and references are allowed when they reduce repeated work, but do not add extra config, indirection, or persistent files without a current need.
  shape:
    - Identify whether README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, or active plans/issue-<id>/ files are needed to settle Forma governance, scope, validation, or boundary decisions; if repository facts are needed, hand off to the ground stage instead of exploring from the plan stage.
    - For new or changed Forma functionality, plan the developer CLI surface and target workflow output behavior first.
    - For temporary workflow-generation constraints, classify natural-language rules into minimal default, stage-specific execution, or conditional overlay targets before writing examples or tasks.
    - Prefer durable profile changes for repeated behavior and one-off constraints only for temporary generated workflow output.
  gauge:
    - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, active plan/task files, pyproject.toml, relevant source directories, tests, and examples read-only before finalization.
  seal:
    - Read README.md, README.zh-CN.md, STRUCTURE.md, AGENTS.md, active plans/issue-<id>/ files, and dist/AGENTS.md when release artifacts are in scope before writing final tasks that affect Forma governance, profile ownership, generated baselines, or documentation policy.
    - For target workflow output changes, write tasks that validate the developer CLI path and generated output behavior.
    - If .forma changes, validate self-profile output by generating it under /tmp, /private/tmp, or $TMPDIR and running forma verify; do not write self-profile output into dist.
    - Prefer durable profile changes for repeated behavior and one-off constraints only for temporary generated workflow output.
validation_commands:
  default:
    - uv run --extra dev python -m pytest -p no:cacheprovider tests/
    - git diff --check
