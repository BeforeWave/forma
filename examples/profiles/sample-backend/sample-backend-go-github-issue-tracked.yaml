profile:
  id: sample-backend-go-github-issue-tracked
  description: Top-level sanitized Go backend sample for teams that commonly track development work through GitHub issues.
includes:
  - sample-base
  - sample-dev
  - sample-backend
  - languages/go.yaml
bundle:
  name: sample-backend-go-github-issue-tracked
  description: Sanitized sample Go backend plan-first workflow bundle for GitHub issue tracked development.
stages:
  shape:
    name: backend-plan-first-plan
    directory: backend-plan-first-plan
    display_name: Backend Plan-First Plan
    short_description: >-
      Use only in Plan mode to clarify Goal/Scope/Approach/Validation, Plan
      Strategy, selected grounding producer, and any applicable Artifact/Evidence
      Boundary for backend work without assuming a specific language stack before
      lock. Chat-only: do not inspect repo; do not write
      plan.md/tasks.md; return clarifying/blocked when decisions remain open.
    default_prompt: >-
      In Plan mode only, converge Goal/Scope/Approach/Validation, Plan Strategy,
      selected grounding producer, and any applicable Artifact/Evidence Boundary
      for backend work without assuming a specific language stack before
      lock. Stay chat-only, require clarifying/blocked while decisions
      remain open, do not inspect the repo from the plan stage, and do not write
      plan.md or tasks.md. Keep the interaction in convergence mode until the
      user confirms the plan is ready for finalization.
  gauge:
    name: backend-plan-first-ground
    directory: backend-plan-first-ground
    display_name: Backend Plan-First Ground
    short_description: Produce a read-only repository grounding handoff for backend work without assuming a specific language stack.
    default_prompt: >-
      Explore the repository read-only after plan intent is settled and produce
      a grounding handoff for backend work without assuming a specific language
      stack. Keep the work read-only and produce a grounding handoff for later
      finalization.
  seal:
    name: backend-plan-first-lock
    directory: backend-plan-first-lock
    display_name: Backend Plan-First Lock
    short_description: Create and certify final ./plans/issue-<id>/plan.md and tasks.md from an already-settled backend plan.
    default_prompt: >-
      Write plan.md and tasks.md for the current issue only after goal, scope,
      approach, validation, plan strategy, grounding, and evidence boundaries
      are explicitly settled. Show the content for user confirmation and commit
      only after explicit permission. Certify that tasks cover the Goal,
      Acceptance proves the Goal, validation covers core risks, and task/evidence
      boundaries are executable before writing files.
  pour:
    name: backend-plan-first-execute
    directory: backend-plan-first-execute
    display_name: Backend Plan-First Execute
    short_description: Implement the current task for backend work without assuming a specific language stack.
    default_prompt: >-
      Implement the current task using the packaged workflow and report the
      outcome. Keep each task review-gated, and after an approved completion
      immediately continue to the next workflow task if one remains.
  flow:
    name: backend-plan-first-showhand
    directory: backend-plan-first-showhand
    display_name: Backend Plan-First Showhand
    short_description: Sequentially implement all tasks from an already-locked backend plan automatically.
    default_prompt: >-
      Execute the already-locked issue plan sequentially using the packaged
      workflow. Do not create, rewrite, or commit plan.md/tasks.md; if planning
      files are missing, templated, incomplete, or uncertified, stop and hand off
      to the lock stage or the required grounding producer. Preflight task
      permissions, make bounded execution decisions directly, and automatically
      move through review-ready and complete for each task.
constraints:
  default:
    - This sample demonstrates tracked profile composition without organization-specific workflow details.
  shape:
    - When GitHub issue URLs are source-of-truth refs, load and follow `references/script-resource-adapter.md`, then run `python3 scripts/github_issue_context.py <issue-url-or-user-text>` before deciding planning context is incomplete.
  seal:
    - When the planning handoff depends on GitHub issue refs, load and follow `references/script-resource-adapter.md`, then run `python3 scripts/github_issue_context.py <issue-url-or-user-text>` before finalization if issue body and key comments are not already confirmed.
resources:
  shape:
    references:
      - source: ../../../source/methodology/resources/shared/references/script-resource-adapter.md
        dest: script-resource-adapter.md
    scripts:
      - source: ../../../source/methodology/resources/shared/script/github_issue_context.py
        dest: github_issue_context.py
  seal:
    references:
      - source: ../../../source/methodology/resources/shared/references/script-resource-adapter.md
        dest: script-resource-adapter.md
    scripts:
      - source: ../../../source/methodology/resources/shared/script/github_issue_context.py
        dest: github_issue_context.py
decision_gate_extras:
  - API or stream impact
  - Data migration or persistence impact
