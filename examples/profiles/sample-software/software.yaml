profile:
  id: sample-software
  description: Sanitized software plan-first behavior overlay derived from a downstream software workflow family.
constraints:
  default:
    - Treat the suite as a workflow controller, not as stack-specific coding guidance.
    - Do not enter implementation until Goal, Scope, Approach, Validation, Plan Strategy, Impact Profile, Impact Boundary, and source-of-truth needs are settled.
    - Use Impact Profile to classify the primary surface as frontend, backend, fullstack, or generic.
    - Bind completion claims to validation evidence or explicit review-only rationale.
  shape:
    - Stay chat-only; do not read the repository, write plan files, or execute implementation commands during plan convergence.
    - Return clarifying or blocked when decisions are incomplete; return proposal-ready only when the gate is complete and grounding needs are explicit.
  gauge:
    - Inspect project rules, source of truth, target surfaces, validation commands, and protected/generated paths read-only.
    - Mark missing repository facts as unknown instead of inventing paths, contracts, designs, copy, data, or validation methods.
  seal:
    - Write plan.md and tasks.md only after the decision gate is complete and required grounding has been reviewed.
    - Do not seal a plan when artifact ownership, source-of-truth priority, or validation evidence boundaries are unresolved.
  pour:
    - Execute only the first incomplete planned task and stop if plan assumptions, source of truth, or validation model prove wrong.
    - Run review-ready after validation, and complete only after the reviewed task outcome is accepted.
  flow:
    - Use automatic execution only when decision, grounding, seal, validation, source-of-truth, and worktree safety gates all pass.
    - Do not let showhand skip grounding, plan sealing, review evidence, or validation.
