skills:
  shape:
    description: Use plan-oriented collaboration to converge a software implementation plan in chat without repository reads or coding.
  gauge:
    description: Produce read-only grounding for project facts, contracts, rules, paths, and validation.
  seal:
    description: Write plan.md and tasks.md, validate task structure, and seal the workflow.
  pour:
    description: Execute exactly one current task, validate it, and stop for review.
  flow:
    description: Run the full plan-first workflow only when all automation safety gates pass.
decision_gate_extras:
  - Impact Profile
  - Impact Boundary
  - Source-of-truth readiness
